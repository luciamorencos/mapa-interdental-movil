<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Calibración - Móvil Clínico Preciso</title>

<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#f2f2f2;}
#header{padding:4px 6px;background:#fff;border-bottom:1px solid #ddd;font-size:14px;height:30px;display:flex;align-items:center;}
#patientId{width:60px;margin-left:5px;}
#mapWrapper{position:absolute;top:40px;bottom:90px;left:0;right:0;display:flex;justify-content:center;align-items:center;overflow:hidden;}
#bg{height:100%;width:auto;display:block;user-select:none;-webkit-user-drag:none;}
canvas{position:absolute;top:0;touch-action:none;}
#toolbar{position:absolute;bottom:0;left:0;width:100%;background:#fff;border-top:2px solid #ccc;padding:4px;box-sizing:border-box;}
.row{display:flex;justify-content:space-between;margin-bottom:4px;}
button{flex:1;margin:2px;padding:8px 0;font-size:12px;font-weight:bold;border-radius:6px;border:1px solid #555;cursor:pointer;}
.color-btn{color:white;}
</style>
</head>

<body>

<div id="header">
    <strong>ID:</strong>
    <input type="number" id="patientId" placeholder="1234">
</div>

<div id="mapWrapper">
    <img id="bg" src="mapa_bg.png">
    <canvas id="canvas"></canvas>
</div>

<div id="toolbar">
    <div class="row">
        <button class="color-btn" style="background:#009FE3" onclick="selectColor('#009FE3',false)">06</button>
        <button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613',false)">07</button>
        <button class="color-btn" style="background:#E6007E" onclick="selectColor('#E6007E',false)">08</button>
        <button style="background:#FFD500" onclick="selectColor('#FFD500',false)">09</button>
        <button class="color-btn" style="background:#7CB518" onclick="selectColor('#7CB518',false)">011</button>
    </div>

    <div class="row">
        <button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613',true)">405</button>
        <button class="color-btn" style="background:#E83E8C" onclick="selectColor('#E83E8C',true)">406</button>
        <button class="color-btn" style="background:#6F42C1" onclick="selectColor('#6F42C1',true)">408</button>
        <button class="color-btn" style="background:#0B3C5D" onclick="selectColor('#0B3C5D',true)">410</button>
        <button onclick="selectX()">X</button>
    </div>

    <div class="row">
        <button onclick="selectEraser()">🧽</button>
        <button onclick="undo()">↩</button>
        <button onclick="saveImage()">💾</button>
        <button onclick="selectFree()">✏</button>
    </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const bg = document.getElementById("bg");

let color = "#000";
let mode = "arrow";
let history = [];
let isPerio = false;
let drawing = false;

// Sincronización crucial con el nombre mapa_bg.png
bg.onload = resizeCanvas;
if (bg.complete) resizeCanvas();

window.onresize = resizeCanvas;

function resizeCanvas() {
    canvas.width = bg.clientWidth;
    canvas.height = bg.clientHeight;
    canvas.style.left = bg.offsetLeft + "px";
    canvas.style.top = bg.offsetTop + "px";
}

function saveState() {
    history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

function undo() {
    if(history.length > 0) ctx.putImageData(history.pop(), 0, 0);
}

function selectColor(c, perio) {
    color = c;
    mode = "arrow";
    isPerio = perio;
}

function selectX() { mode = "drawX"; }
function selectEraser() { mode = "erase"; }
function selectFree() { mode = "free"; color = "#000"; }

function getTouchPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
    };
}

canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    const pos = getTouchPos(e);
    saveState();
    if(mode === "arrow") drawArrow(pos.x, pos.y);
    else if(mode === "drawX") drawX(pos.x, pos.y);
    else if(mode === "erase") { drawing = true; erase(pos.x, pos.y); }
    else if(mode === "free") { drawing = true; ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
});

canvas.addEventListener("touchmove", function(e) {
    const pos = getTouchPos(e);
    if(mode === "erase" && drawing) erase(pos.x, pos.y);
    if(mode === "free" && drawing) {
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#000";
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }
});

canvas.addEventListener("touchend", function() { drawing = false; });

function erase(x, y) { ctx.clearRect(x - 10, y - 10, 20, 20); }

function drawArrow(x, y) {
    // Cálculo radial basado en el centro del mapa Curaprox
    const midY = canvas.height * 0.46; 
    const midX = canvas.width / 2;
    const length = canvas.height * 0.045;

    let angle = Math.atan2(y - midY, x - midX);
    let direction = (y < midY) ? -1 : 1;

    const endX = x + Math.cos(angle) * (length * direction);
    const endY = y + Math.sin(angle) * (length * direction);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2.5;

    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    const headSize = length * 0.35;
    const arrowAngle = Math.atan2(endY - y, endX - x);

    ctx.beginPath();
    ctx.moveTo(endX, endY);
    ctx.lineTo(endX - headSize * Math.cos(arrowAngle - Math.PI / 6),
               endY - headSize * Math.sin(arrowAngle - Math.PI / 6));
    ctx.lineTo(endX - headSize * Math.cos(arrowAngle + Math.PI / 6),
               endY - headSize * Math.sin(arrowAngle + Math.PI / 6));
    ctx.closePath();
    ctx.fill();

    if(isPerio) {
        ctx.font = "bold 12px Arial";
        ctx.fillText("P", x + 4, y - 4);
    }
}

function drawX(x, y) {
    const size = 7;
    ctx.strokeStyle = "black";
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x - size, y - size);
    ctx.lineTo(x + size, y + size);
    ctx.moveTo(x + size, y - size);
    ctx.lineTo(x - size, y + size);
    ctx.stroke();
}

function saveImage() {
    const temp = document.createElement("canvas");
    temp.width = canvas.width;
    temp.height = canvas.height;
    const t = temp.getContext("2d");
    
    t.fillStyle = "#fff";
    t.fillRect(0,0,temp.width,temp.height);
    t.drawImage(bg, 0, 0, temp.width, temp.height);
    t.drawImage(canvas, 0, 0);
    
    const pid = document.getElementById("patientId").value;
    if(pid) {
        t.font = "bold 20px Arial";
        t.fillStyle = "#000";
        t.fillText("ID: " + pid, 20, 40);
    }
    
    const link = document.createElement("a");
    link.href = temp.toDataURL("image/png");
    link.download = "calibracion_" + (pid || "curaprox") + ".png";
    link.click();
}
</script>

</body>
</html>
