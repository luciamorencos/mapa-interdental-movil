<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Calibración Interdental – V36 Final Clínico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f0f0f0;
 overflow:auto;
}

#header{
 position:sticky;
 top:0;
 z-index:50;
 background:#fff;
 padding:10px;
 border-bottom:2px solid #ddd;
 text-align:center;
}

#header input{
 padding:6px 8px;
 font-size:14px;
 width:140px;
 border:1px solid #999;
 border-radius:4px;
}

#mainWrapper{
 width:100%; max-width:700px;
 margin:20px auto;
 position:relative;
}

#bg{
 width:100%; max-width:700px;
 display:block;
}

canvas{
 position:absolute;
 top:0;
 left:0;
}

#toolbar{
 position:absolute;
 top:40%;
 left:50%;
 transform:translate(-50%,-50%);
 background:rgba(255,255,255,.98);
 padding:8px 10px;
 border:1px solid #aaa;
 border-radius:8px;
 box-shadow:0 4px 10px rgba(0,0,0,.2);
 z-index:20;
 cursor:move;
}

button{
 margin:2px;
 padding:4px 7px;
 border:1px solid #555;
 cursor:pointer;
 font-size:16px; padding:8px 10px;
 font-weight:bold;
 border-radius:5px;
}

.color-btn{color:white;}

#previewBox{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.85);
 z-index:200;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

#previewBox img{
 max-width:90%;
 max-height:80%;
 border:4px solid white;
 background:white;
}

#previewBox button{
 margin-top:10px;
 padding:8px 14px;
 font-size:14px;
}
</style>
</head>

<body>

<div id="header">
 <strong>ID paciente:</strong>
 <input type="number" id="patientId" placeholder="Ej. 12345">
</div>

<div id="mainWrapper">

<div id="toolbar">
<b>PRIME</b><br>
<button class="color-btn" style="background:#009FE3" onclick="selectColor('#009FE3','prime')">06</button>
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613','prime')">07</button>
<button class="color-btn" style="background:#E6007E" onclick="selectColor('#E6007E','prime')">08</button>
<button class="color-btn" style="background:#FFD500;color:#000" onclick="selectColor('#FFD500','prime')">09</button>
<button class="color-btn" style="background:#7CB518" onclick="selectColor('#7CB518','prime')">011</button>

<br><br>

<b>PERIO</b><br>
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613','perio')">405</button>
<button class="color-btn" style="background:#E83E8C" onclick="selectColor('#E83E8C','perio')">406</button>
<button class="color-btn" style="background:#6F42C1" onclick="selectColor('#6F42C1','perio')">408</button>
<button class="color-btn" style="background:#0B3C5D" onclick="selectColor('#0B3C5D','perio')">410</button>

<br><br>

<button onclick="selectX()">X</button>
<button onclick="selectFree()">✏</button>
<button onclick="selectEraser()">🧽</button>
<button onclick="undo()">↩</button>
<button onclick="saveImage()">💾</button>
</div>

<img id="bg" src="mapa_bg.png" style="width:100%; height:auto;">
<canvas id="canvas"></canvas>

</div>

<div id="previewBox">
 <img id="previewImg">
 <button onclick="downloadImage()">⬇️ Descargar imagen</button>
 <button onclick="closePreview()">Cerrar</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const bg=document.getElementById("bg");
const toolbar=document.getElementById("toolbar");

let history=[];
let color="#000";
let mode="arrow";
let type="prime";
let start=null;
let drawing=false;
let lastImageURL="";

bg.onload=()=>{
 canvas.width=bg.width;
 canvas.height=bg.height;
 saveState();
};

function saveState(){
 history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
}

function undo(){
 if(history.length>1){
  history.pop();
  ctx.putImageData(history[history.length-1],0,0);
 }
}

function selectColor(c,t){ color=c; type=t; mode="arrow"; }
function selectFree(){ mode="free"; }
function selectEraser(){ mode="erase"; }
function selectX(){ mode="drawX"; }

function getMousePos(e){
 const rect=canvas.getBoundingClientRect();
 return {
  x:e.clientX-rect.left,
  y:e.clientY-rect.top
 };
}

function drawXMark(x,y){
 saveState();
 const size=10;
 ctx.strokeStyle="black";
 ctx.lineWidth=2;
 ctx.beginPath();
 ctx.moveTo(x-size,y-size);
 ctx.lineTo(x+size,y+size);
 ctx.moveTo(x+size,y-size);
 ctx.lineTo(x-size,y+size);
 ctx.stroke();
}
function eraseAt(x,y){
 saveState();
 const radius = 30;  // goma MAX clínica (borra flecha + "P" completa)
 ctx.save();
 ctx.beginPath();
 ctx.arc(x, y, radius, 0, Math.PI * 2);
 ctx.clip();
 ctx.clearRect(x - radius, y - radius, radius*2, radius*2);
 ctx.restore();
}


function drawArrow(x1,y1,x2,y2){
 saveState();
 const ang=Math.atan2(y2-y1,x2-x1);
 const len=38;
 const head=10;
 const ex=x1+len*Math.cos(ang);
 const ey=y1+len*Math.sin(ang);
 ctx.strokeStyle=color;
 ctx.fillStyle=color;
 ctx.lineWidth=4;
 ctx.lineCap="round";
 ctx.beginPath();
 ctx.moveTo(x1,y1);
 ctx.lineTo(ex,ey);
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(ex,ey);
 ctx.lineTo(ex-head*Math.cos(ang-Math.PI/6), ey-head*Math.sin(ang-Math.PI/6));
 ctx.lineTo(ex-head*Math.cos(ang+Math.PI/6), ey-head*Math.sin(ang+Math.PI/6));
 ctx.closePath();
 ctx.fill();
 if(type==="perio"){
  ctx.font="bold 11px Arial";
  const px=x1-12*Math.cos(ang);
  const py=y1-12*Math.sin(ang);
  ctx.fillText("P",px,py);
 }
}

canvas.addEventListener("mousedown",e=>{
 const pos=getMousePos(e);

 if(mode==="arrow"){
  start=pos;
 }
 else if(mode==="free"){
  drawing=true;
  saveState();
  ctx.beginPath();
  ctx.moveTo(pos.x,pos.y);
 }
 else if(mode==="drawX"){
  drawXMark(pos.x,pos.y);
 }
 else if(mode==="erase"){
  eraseAt(pos.x,pos.y);
 }
});

canvas.addEventListener("mousemove",e=>{
 if(drawing && mode==="free"){
  const pos=getMousePos(e);
  ctx.lineWidth=2;
  ctx.strokeStyle="black";
  ctx.lineTo(pos.x,pos.y);
  ctx.stroke();
 }
});

canvas.addEventListener("mouseup",e=>{
 if(mode==="arrow" && start){
  const pos=getMousePos(e);
  drawArrow(start.x,start.y,pos.x,pos.y);
  start=null;
 }
 drawing=false;
});

canvas.addEventListener("mouseout",()=>drawing=false);

let drag=false,dx=0,dy=0;

toolbar.addEventListener("mousedown",e=>{
 drag=true;
 dx=e.clientX-toolbar.offsetLeft;
 dy=e.clientY-toolbar.offsetTop;
});

document.addEventListener("mousemove",e=>{
 if(drag){
  toolbar.style.left=(e.clientX-dx)+"px";
  toolbar.style.top=(e.clientY-dy)+"px";
  toolbar.style.transform="none";
 }
});

document.addEventListener("mouseup",()=>drag=false);




function saveImage(){
 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const t=temp.getContext("2d");

 // Dibujar fondo
 t.drawImage(bg,0,0,temp.width,temp.height);

 // Dibujar anotaciones
 t.drawImage(canvas,0,0);

 // Añadir ID paciente si existe (más grande y visible)
 const pid=document.getElementById("patientId").value;
 if(pid){
  t.font="bold 22px Arial";
  t.fillStyle="#000";
  t.fillText("ID: "+pid,15,30);
 }

 const finalImage=temp.toDataURL("image/png");

 const name="calibracion_"+(pid||"paciente")+".png";
 const a=document.createElement("a");
 a.href=finalImage;
 a.download=name;
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
}




function closePreview(){
 document.getElementById("previewBox").style.display="none";
}

function downloadImage(){
 if(!lastImageURL) return;
 const pid=document.getElementById("patientId").value;
 const name="calibracion_"+(pid||"paciente")+".png";
 const a=document.createElement("a");
 a.href=lastImageURL;
 a.download=name;
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
}


// ===== SISTEMA MOVIL TOQUE-TOQUE PARA FLECHAS =====
canvas.addEventListener("touchstart", function(e){
 e.preventDefault();
 const touch = e.touches[0];
 const rect = canvas.getBoundingClientRect();
 const x = touch.clientX - rect.left;
 const y = touch.clientY - rect.top;

 if(mode==="arrow"){
  if(!start){
   start = {x:x, y:y};
  } else {
   drawArrow(start.x,start.y,x,y);
   start = null;
  }
 }
 else if(mode==="drawX"){
  drawXMark(x,y);
 }
 else if(mode==="erase"){
  eraseAt(x,y);
 }
});

</script>

</body>
</html>
