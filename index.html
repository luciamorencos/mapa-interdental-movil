<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Calibración - Versión Móvil</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#f2f2f2;}
#header{padding:10px;background:#fff;border-bottom:1px solid #ddd;}
#header input{padding:8px;font-size:16px;width:160px;}
#mapContainer{position:relative;width:100%;max-width:700px;margin:0 auto;}
#bg{width:100%;display:block;}
canvas{position:absolute;top:0;left:0;}
#toolbar{position:fixed;bottom:0;left:0;width:100%;background:#ffffff;border-top:2px solid #ccc;padding:8px 4px;box-shadow:0 -2px 8px rgba(0,0,0,.15);}
.toolbar-row{display:flex;justify-content:space-around;margin-bottom:6px;}
button{flex:1;margin:2px;padding:10px 0;font-size:16px;font-weight:bold;border-radius:8px;border:1px solid #555;}
.color-btn{color:white;}
</style>
</head>
<body>

<div id="header">
<strong>ID paciente:</strong>
<input type="number" id="patientId" placeholder="Ej. 12345">
</div>

<div id="mapContainer">
<img id="bg" src="mapa_bg.png">
<canvas id="canvas"></canvas>
</div>

<div id="toolbar">
<div class="toolbar-row">
<button class="color-btn" style="background:#009FE3" onclick="selectColor('#009FE3','prime')">06</button>
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613','prime')">07</button>
<button class="color-btn" style="background:#E6007E" onclick="selectColor('#E6007E','prime')">08</button>
<button style="background:#FFD500;color:#000" onclick="selectColor('#FFD500','prime')">09</button>
<button class="color-btn" style="background:#7CB518" onclick="selectColor('#7CB518','prime')">011</button>
</div>
<div class="toolbar-row">
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613','perio')">405</button>
<button class="color-btn" style="background:#E83E8C" onclick="selectColor('#E83E8C','perio')">406</button>
<button class="color-btn" style="background:#6F42C1" onclick="selectColor('#6F42C1','perio')">408</button>
<button class="color-btn" style="background:#0B3C5D" onclick="selectColor('#0B3C5D','perio')">410</button>
</div>
<div class="toolbar-row">
<button onclick="selectX()">X</button>
<button onclick="selectEraser()">🧽</button>
<button onclick="undo()">↩</button>
<button onclick="saveImage()">💾</button>
</div>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const bg=document.getElementById("bg");
let history=[];let color="#000";let mode="arrow";let type="prime";let start=null;

bg.onload=()=>{resizeCanvas();saveState();};
window.addEventListener("resize",resizeCanvas);

function resizeCanvas(){canvas.width=bg.clientWidth;canvas.height=bg.clientHeight;}
function saveState(){history.push(ctx.getImageData(0,0,canvas.width,canvas.height));}
function undo(){if(history.length>1){history.pop();ctx.putImageData(history[history.length-1],0,0);}}
function selectColor(c,t){color=c;type=t;mode="arrow";}
function selectX(){mode="drawX";}
function selectEraser(){mode="erase";}

function getTouchPos(e){const rect=canvas.getBoundingClientRect();const touch=e.touches[0];return{x:(touch.clientX-rect.left),y:(touch.clientY-rect.top)};}

canvas.addEventListener("touchstart",function(e){e.preventDefault();const pos=getTouchPos(e);
if(mode==="arrow"){if(!start){start=pos;}else{drawArrow(start.x,start.y,pos.x,pos.y);start=null;}}
else if(mode==="drawX"){drawXMark(pos.x,pos.y);}
else if(mode==="erase"){eraseAt(pos.x,pos.y);} });

function drawXMark(x,y){saveState();const size=10;ctx.lineWidth=2;ctx.strokeStyle="black";ctx.beginPath();ctx.moveTo(x-size,y-size);ctx.lineTo(x+size,y+size);ctx.moveTo(x+size,y-size);ctx.lineTo(x-size,y+size);ctx.stroke();}
function eraseAt(x,y){saveState();const radius=30;ctx.save();ctx.beginPath();ctx.arc(x,y,radius,0,Math.PI*2);ctx.clip();ctx.clearRect(x-radius,y-radius,radius*2,radius*2);ctx.restore();}

function drawArrow(x1,y1,x2,y2){saveState();const ang=Math.atan2(y2-y1,x2-x1);const len=40;const head=12;const ex=x1+len*Math.cos(ang);const ey=y1+len*Math.sin(ang);
ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke();
ctx.beginPath();ctx.moveTo(ex,ey);
ctx.lineTo(ex-head*Math.cos(ang-Math.PI/6),ey-head*Math.sin(ang-Math.PI/6));
ctx.lineTo(ex-head*Math.cos(ang+Math.PI/6),ey-head*Math.sin(ang+Math.PI/6));
ctx.closePath();ctx.fill();}

function saveImage(){const temp=document.createElement("canvas");temp.width=canvas.width;temp.height=canvas.height;const t=temp.getContext("2d");
t.drawImage(bg,0,0,temp.width,temp.height);t.drawImage(canvas,0,0);
const pid=document.getElementById("patientId").value;if(pid){t.font="bold 22px Arial";t.fillStyle="#000";t.fillText("ID: "+pid,15,30);}
const finalImage=temp.toDataURL("image/png");const a=document.createElement("a");a.href=finalImage;a.download="calibracion_"+(pid||"paciente")+".png";document.body.appendChild(a);a.click();document.body.removeChild(a);}
</script>

</body>
</html>
