<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Calibración - Móvil Clínico Zonas</title>

<style>
html,body{
 margin:0;
 padding:0;
 height:100%;
 font-family:Arial, sans-serif;
 background:#f2f2f2;
 overflow:hidden;
}

#header{
 padding:6px;
 background:#fff;
 border-bottom:1px solid #ddd;
}

#header input{
 padding:6px;
 font-size:16px;
 width:140px;
}

#mapWrapper{
 position:absolute;
 top:48px;
 bottom:148px;
 left:0;
 right:0;
 display:flex;
 justify-content:center;
 align-items:center;
}

#bg{
 height:100%;
 width:auto;
 display:block;
}

canvas{
 position:absolute;
}

#toolbar{
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 background:#ffffff;
 border-top:2px solid #ccc;
 padding:6px 4px;
}

.toolbar-row{
 display:flex;
 justify-content:space-around;
 margin-bottom:4px;
}

button{
 flex:1;
 margin:2px;
 padding:6px 0;
 font-size:14px;
 font-weight:bold;
 border-radius:6px;
 border:1px solid #555;
}

.color-btn{ color:white; }
</style>
</head>

<body>

<div id="header">
<strong>ID paciente:</strong>
<input type="number" id="patientId" placeholder="Ej. 12345">
</div>

<div id="mapWrapper">
<img id="bg" src="mapa_bg.png" alt="Mapa calibración">
<canvas id="canvas"></canvas>
</div>

<div id="toolbar">

<div class="toolbar-row">
<button class="color-btn" style="background:#009FE3" onclick="selectColor('#009FE3')">06</button>
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613')">07</button>
<button class="color-btn" style="background:#E6007E" onclick="selectColor('#E6007E')">08</button>
<button style="background:#FFD500;color:#000" onclick="selectColor('#FFD500')">09</button>
<button class="color-btn" style="background:#7CB518" onclick="selectColor('#7CB518')">011</button>
</div>

<div class="toolbar-row">
<button class="color-btn" style="background:#E30613" onclick="selectColor('#E30613')">405</button>
<button class="color-btn" style="background:#E83E8C" onclick="selectColor('#E83E8C')">406</button>
<button class="color-btn" style="background:#6F42C1" onclick="selectColor('#6F42C1')">408</button>
<button class="color-btn" style="background:#0B3C5D" onclick="selectColor('#0B3C5D')">410</button>
</div>

<div class="toolbar-row">
<button onclick="selectX()">X</button>
<button onclick="selectEraser()">🧽</button>
<button onclick="undo()">↩</button>
<button onclick="saveImage()">💾</button>
</div>

</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const bg=document.getElementById("bg");

let history=[];
let color="#000";
let mode="arrow";

function resizeCanvas(){
 canvas.width=bg.clientWidth || window.innerWidth;
 canvas.height=bg.clientHeight || window.innerHeight;
}

window.addEventListener("load", resizeCanvas);
window.addEventListener("resize", resizeCanvas);

function saveState(){
 history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
}

function undo(){
 if(history.length>0){
  ctx.putImageData(history.pop(),0,0);
 }
}

function selectColor(c){
 color=c;
 mode="arrow";
}

function selectX(){ mode="drawX"; }
function selectEraser(){ mode="erase"; }

function getTouchPos(e){
 const rect=canvas.getBoundingClientRect();
 const touch=e.touches[0];
 return { x:(touch.clientX-rect.left), y:(touch.clientY-rect.top) };
}

canvas.addEventListener("touchstart",function(e){
 e.preventDefault();
 const pos=getTouchPos(e);

 if(mode==="arrow"){
  saveState();
  drawAutoArrow(pos.x,pos.y);
 }
 else if(mode==="drawX"){
  saveState();
  drawXMark(pos.x,pos.y);
 }
 else if(mode==="erase"){
  saveState();
  eraseAt(pos.x,pos.y);
 }
});

function drawAutoArrow(x,y){

 const midX = canvas.width / 2;
 const midY = canvas.height / 2;

 const length = 28; // longitud fija clínica
 let dx = 0;
 let dy = 0;

 if(y < midY){ // arcada superior
    if(Math.abs(x - midX) < canvas.width * 0.1){
        dx = 0; dy = 1; // ↓ incisivos sup
    } else if(x > midX){
        dx = -0.7; dy = 0.7; // ↙ sector 1-2
    } else {
        dx = 0.7; dy = 0.7; // ↘ sector 2-3
    }
 } else { // arcada inferior
    if(Math.abs(x - midX) < canvas.width * 0.1){
        dx = 0; dy = -1; // ↑ incisivos inf
    } else if(x > midX){
        dx = -0.7; dy = -0.7; // ↖ sector 4-5
    } else {
        dx = 0.7; dy = -0.7; // ↗ sector 3-4
    }
 }

 const endX = x + dx * length;
 const endY = y + dy * length;

 ctx.strokeStyle=color;
 ctx.fillStyle=color;
 ctx.lineWidth=3;

 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.lineTo(endX,endY);
 ctx.stroke();

 const angle=Math.atan2(endY-y,endX-x);
 const headLength=8;

 ctx.beginPath();
 ctx.moveTo(endX,endY);
 ctx.lineTo(
   endX - headLength * Math.cos(angle - Math.PI/6),
   endY - headLength * Math.sin(angle - Math.PI/6)
 );
 ctx.lineTo(
   endX - headLength * Math.cos(angle + Math.PI/6),
   endY - headLength * Math.sin(angle + Math.PI/6)
 );
 ctx.closePath();
 ctx.fill();
}

function drawXMark(x,y){
 const size=6;
 ctx.lineWidth=2;
 ctx.strokeStyle="black";
 ctx.beginPath();
 ctx.moveTo(x-size,y-size);
 ctx.lineTo(x+size,y+size);
 ctx.moveTo(x+size,y-size);
 ctx.lineTo(x-size,y+size);
 ctx.stroke();
}

function eraseAt(x,y){
 const radius=30;
 ctx.save();
 ctx.beginPath();
 ctx.arc(x,y,radius,0,Math.PI*2);
 ctx.clip();
 ctx.clearRect(x-radius,y-radius,radius*2,radius*2);
 ctx.restore();
}

function saveImage(){
 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const t=temp.getContext("2d");

 t.drawImage(bg,0,0,temp.width,temp.height);
 t.drawImage(canvas,0,0);

 const pid=document.getElementById("patientId").value;
 if(pid){
  t.font="bold 22px Arial";
  t.fillStyle="#000";
  t.fillText("ID: "+pid,15,30);
 }

 const finalImage=temp.toDataURL("image/png");
 const a=document.createElement("a");
 a.href=finalImage;
 a.download="calibracion_"+(pid||"paciente")+".png";
 document.body.appendChild(a);
 a.click();
 document.body.removeChild(a);
}
</script>

</body>
</html>
