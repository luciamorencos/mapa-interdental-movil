<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa Calibración - Móvil Ajuste Final</title>

<style>
html,body{
 margin:0;
 padding:0;
 height:100%;
 overflow:hidden;
 font-family:Arial,sans-serif;
 background:#f2f2f2;
}

#header{
 padding:6px;
 background:#fff;
 border-bottom:1px solid #ddd;
}

/* 🔵 Ajustado para máximo tamaño sin scroll */
#mapWrapper{
 position:absolute;
 top:40px;
 bottom:110px;
 left:0;
 right:0;
 display:flex;
 justify-content:center;
 align-items:center;
}

#bg{
 height:100%;
 width:auto;
 display:block;
}

canvas{
 position:absolute;
}

#toolbar{
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 background:#fff;
 border-top:2px solid #ccc;
 padding:6px;
 display:flex;
 justify-content:space-around;
}

button{
 padding:6px 10px;
 font-size:14px;
 font-weight:bold;
 border-radius:6px;
 border:1px solid #555;
}

</style>
</head>

<body>

<div id="header">
<strong>ID paciente:</strong>
<input type="number" id="patientId" placeholder="Ej. 12345">
</div>

<div id="mapWrapper">
<img id="bg" src="mapa_bg.png">
<canvas id="canvas"></canvas>
</div>

<div id="toolbar">
<button onclick="selectColor('#009FE3')" style="background:#009FE3;color:white">06</button>
<button onclick="selectColor('#E30613')" style="background:#E30613;color:white">07</button>
<button onclick="selectColor('#E6007E')" style="background:#E6007E;color:white">08</button>
<button onclick="selectColor('#FFD500')">09</button>
<button onclick="selectColor('#7CB518')" style="background:#7CB518;color:white">011</button>
<button onclick="selectX()">X</button>
<button onclick="undo()">↩</button>
<button onclick="saveImage()">💾</button>
</div>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const bg=document.getElementById("bg");

let color="#000";
let mode="arrow";
let history=[];

function resizeCanvas(){
 canvas.width=bg.clientWidth;
 canvas.height=bg.clientHeight;
}

window.onload=resizeCanvas;
window.onresize=resizeCanvas;

function saveState(){
 history.push(ctx.getImageData(0,0,canvas.width,canvas.height));
}

function undo(){
 if(history.length>0){
   ctx.putImageData(history.pop(),0,0);
 }
}

function selectColor(c){color=c;mode="arrow";}
function selectX(){mode="drawX";}

function getTouchPos(e){
 const rect=canvas.getBoundingClientRect();
 const touch=e.touches[0];
 return {x:touch.clientX-rect.left,y:touch.clientY-rect.top};
}

canvas.addEventListener("touchstart",function(e){
 e.preventDefault();
 const pos=getTouchPos(e);
 saveState();
 if(mode==="arrow"){drawClinicalArrow(pos.x,pos.y);} else {drawX(pos.x,pos.y);}
});

function drawClinicalArrow(x,y){

 const midY=canvas.height/2;
 const midX=canvas.width/2;

 /* 🔵 Flecha proporcional al tamaño real del mapa */
 const length=canvas.height*0.06;  // ligeramente mayor que la altura media del diente
 const incisorWidth=canvas.width*0.12;
 const sideWidth=(canvas.width-incisorWidth)/8;

 let dx=0,dy=0;
 let zone;

 if(Math.abs(x-midX)<incisorWidth/2){zone="incisor";}
 else if(x<midX){zone=Math.floor(x/sideWidth);}
 else{zone=4+Math.floor((x-midX-incisorWidth/2)/sideWidth);}

 if(y<midY){
   if(zone==="incisor"){dx=0;dy=1;}
   else if(zone<=1){dx=1;dy=0;}
   else if(zone==2){dx=0.7;dy=0.7;}
   else if(zone==3){dx=0.4;dy=0.9;}
   else if(zone==4){dx=-0.4;dy=0.9;}
   else if(zone==5){dx=-0.7;dy=0.7;}
   else{dx=-1;dy=0;}
 } else {
   if(zone==="incisor"){dx=0;dy=-1;}
   else if(zone<=1){dx=1;dy=0;}
   else if(zone==2){dx=0.7;dy=-0.7;}
   else if(zone==3){dx=0.4;dy=-0.9;}
   else if(zone==4){dx=-0.4;dy=-0.9;}
   else if(zone==5){dx=-0.7;dy=-0.7;}
   else{dx=-1;dy=0;}
 }

 const endX=x+dx*length;
 const endY=y+dy*length;

 ctx.strokeStyle=color;
 ctx.fillStyle=color;
 ctx.lineWidth=3;

 ctx.beginPath();
 ctx.moveTo(x,y);
 ctx.lineTo(endX,endY);
 ctx.stroke();

 const angle=Math.atan2(endY-y,endX-x);
 const head=length*0.25;

 ctx.beginPath();
 ctx.moveTo(endX,endY);
 ctx.lineTo(endX-head*Math.cos(angle-Math.PI/6),
            endY-head*Math.sin(angle-Math.PI/6));
 ctx.lineTo(endX-head*Math.cos(angle+Math.PI/6),
            endY-head*Math.sin(angle+Math.PI/6));
 ctx.closePath();
 ctx.fill();
}

function drawX(x,y){
 const size=6;
 ctx.strokeStyle="black";
 ctx.lineWidth=2;
 ctx.beginPath();
 ctx.moveTo(x-size,y-size);
 ctx.lineTo(x+size,y+size);
 ctx.moveTo(x+size,y-size);
 ctx.lineTo(x-size,y+size);
 ctx.stroke();
}

function saveImage(){
 const temp=document.createElement("canvas");
 temp.width=canvas.width;
 temp.height=canvas.height;
 const t=temp.getContext("2d");
 t.drawImage(bg,0,0,temp.width,temp.height);
 t.drawImage(canvas,0,0);
 const pid=document.getElementById("patientId").value;
 if(pid){
   t.font="bold 22px Arial";
   t.fillStyle="#000";
   t.fillText("ID: "+pid,15,30);
 }
 const link=document.createElement("a");
 link.href=temp.toDataURL("image/png");
 link.download="calibracion_"+(pid||"paciente")+".png";
 link.click();
}
</script>

</body>
</html>
